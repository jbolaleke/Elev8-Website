<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEV8 Music | Premier Afrobeats Cover Band</title>
    <style>
        :root {
            --gold: #FFD700;
            --deep-orange: #FF8C00;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* HERO CAROUSEL - FULL IMAGE VISIBILITY */
        header {
            height: 85vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 4px solid var(--deep-orange);
            background-color: black;
        }

        .carousel-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .carousel-bg img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain; /* FIX: Ensures full picture shows without zoom */
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .carousel-bg img.active { opacity: 0.5; }

        h1 { font-size: clamp(3rem, 10vw, 5.5rem); margin: 0; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 20px rgba(0,0,0,0.9); }
        .tagline { font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }

        .btn {
            padding: 12px 30px; text-decoration: none; color: white; border-radius: 50px;
            font-weight: bold; margin: 10px; transition: 0.4s; display: inline-block;
        }
        .btn-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .btn-yt { background-color: #FF0000; }
        .btn-book { background-color: var(--deep-orange); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .container { max-width: 1100px; margin: auto; padding: 60px 20px; }

        /* MEET THE TEAM GRID */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .team-card {
            position: relative;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .team-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .team-info {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            box-sizing: border-box;
            transition: background 0.3s ease;
        }

        .team-bio {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: all 0.5s ease; font-size: 0.9rem; color: #eee;
        }

        .team-card:hover img { transform: scale(1.1); }
        .team-card:hover .team-info { background: rgba(0,0,0,0.85); justify-content: center; text-align: center; }
        .team-card:hover .team-bio { max-height: 200px; opacity: 1; margin-top: 15px; }

        .team-card h3 { color: var(--gold); margin: 0; font-size: 1.5rem; }
        .team-card p.role { color: var(--deep-orange); font-weight: bold; margin: 5px 0; text-transform: uppercase; font-size: 0.8rem; }

        /* FORM STYLING */
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        input, select {
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 5px; box-sizing: border-box;
            color-scheme: dark;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }

        footer { text-align: center; padding: 60px; color: #444; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>

            <a href="https://youtube.com/@elev8_msc?si=rKBV1Hr15Xliv-Wb" class="btn btn-yt" target="_blank">YouTube</a>
            <a href="#booking-section" class="btn btn-book">Book Now</a>
