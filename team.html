<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEV8 | Meet the Musicians</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }
        .back-btn { color: #FF8C00; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 40px; }
        .member-block { margin-bottom: 80px; padding-bottom: 40px; border-bottom: 1px solid #222; }
        .member-header { display: grid; grid-template-columns: 300px 1fr; gap: 40px; align-items: start; }
        .member-header img { width: 100%; border-radius: 15px; border: 2px solid #FF8C00; }
        h1 { color: #FFD700; font-size: 2.5rem; margin: 0; }
        h2 { color: #FF8C00; text-transform: uppercase; font-size: 1rem; margin-top: 10px; }
        .bio-text { line-height: 1.8; color: #ccc; margin-top: 20px; font-size: 1.1rem; }
        @media (max-width: 700px) { .member-header { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Homepage</a>
        <div id="team-list"></div>
    </div>

    <script>
        const members = [
            { id: 'david', name: 'David Shonibare', role: 'Aux Keys', bio: 'David is a co-founder and the melodic heart of ELEV8. His unique style blends soulful melodies with high-energy rhythms.', img: 'gallery/David.jpg' },
            { id: 'joshua', name: 'Joshua Olufemi', role: 'Main Keys', bio: 'As the primary keyboardist, Joshua provides the harmonic foundation that elevates every performance.', img: 'gallery/Joshua.jpg' },
            { id: 'ukeme', name: 'Ukeme Enoch', role: 'Drums', bio: 'Ukeme Enoch has shown passion for the drums nurtured by gospel roots since an early age. Well-versed in Gospel, Afro, Reggae, Pop, and Funk, he has been mentoring since 2019. Ukeme is endorsed with Soul-tone Cymbals and his band Lyssa and The Try-tones was nominated for best R&B Artist for the year 2023.', img: 'gallery/Ukeme.jpg' },
            { id: 'john', name: 'John Olaleke', role: 'Bass', bio: 'Guided by his faith in Christ, John Olaleke balances a career as an electrical engineering technologist with a profound calling to music. With 10 years on the bass guitar, his technical skill meets spiritual devotion, playing for Elev8 Music & His Expression to honor the gift he has been blessed with.', img: 'gallery/John.jpg' }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const selectedId = urlParams.get('member');
        const sorted = [...members].sort((a, b) => (a.id === selectedId ? -1 : b.id === selectedId ? 1 : 0));

        const listDiv = document.getElementById('team-list');
        sorted.forEach((m) => {
            listDiv.innerHTML += `
                <div class="member-block">
                    <div class="member-header">
                        <img src="${m.img}" alt="${m.name}">
                        <div>
                            <h1>${m.name}</h1>
                            <h2>${m.role}</h2>
                            <p class="bio-text">${m.bio}</p>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
